name: sinking-city-dataset
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.10
  
  # Geospatial core
  - geopandas=0.14.*
  - rasterio=1.3.*
  - fiona=1.9.*
  - shapely=2.0.*
  - pyproj=3.6.*
  - gdal=3.8.*
  
  # Data processing
  - pandas=2.1.*
  - numpy=1.24.*
  
  # Machine learning
  - scikit-learn=1.3.*
  - scipy=1.11.*
  
  # Visualization
  - matplotlib=3.8.*
  - seaborn=0.13.*
  
  # Jupyter environment
  - jupyter=1.0.*
  - notebook=7.0.*
  - ipykernel=6.27.*
  
  # Additional utilities (optional but recommended)
  - tqdm  # Progress bars
  - pip
  
  # Install via pip if needed
  - pip:
    - momepy>=0.7.0  # Urban morphology (if used in future versions)